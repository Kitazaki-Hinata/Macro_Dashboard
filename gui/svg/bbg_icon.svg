        <!-- mask 中：白色 = 显示；黑色 = 挖空 -->
        <rect width="24" height="24" fill="white"/>

        <!-- 黑色部分会被挖空 -->
        <g transform="translate(6.6,6) scale(0.5)">
            <path d="M18.18,10.89C19,10.42,21,9.88,21,5.94C21,0.28,14.45,0,14.45,0H2v24c0,0,8.28,0,13.03,0
               c4.41,0,6.99-2.93,6.99-7.2C22.02,12.73,19.1,11.47,18.18,10.89z M8,5h4.56c0,0,1.75,0.13,1.75,1.98
               c0,1.85-1.23,2.02-1.75,2.02S8,9,8,9V5z M13.17,19C12.57,19,8,19,8,19v-5h5.17c0,0,2.06,0.1,2.06,2.48
               C15.23,18.51,13.76,19,13.17,19z"
                  fill="black"/>
        </g>
    </mask>

    <!-- 蓝色圆角底板，并应用 mask -->
    <path d="M16.19 2H7.81C4.17 2 2 4.17 2 7.81v8.37C2 19.83 4.17 22 7.81 22h8.37
           C19.83 22 22 19.83 22 16.19V7.81C22 4.17 19.83 2 16.19 2z"
